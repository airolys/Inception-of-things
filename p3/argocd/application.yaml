apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-simple
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/airolys/Inception-of-things'
    targetRevision: HEAD
    path: 'p3/confs' # Folder that contains conf files related to app (deployment + service)
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev # Namespace related to app
  syncPolicy:
    automated: {} # Enables automated sync